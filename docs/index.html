<!DOCTYPE html>
<html>
  <head>
    <title>Carbon element styles</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./scss/index.scss" />
  </head>
  <body>
    <header>
      <docs-panel-toggle-button
        id="menu-toggle-button"
        label="navigation"
        auto-close-on-environment-change="true"
      ></docs-panel-toggle-button>
      <nav>
        <a href="#">
          Carbon
          <b>element styles</b>
          <span id="version"></span>
        </a>
      </nav>

      <div></div>

      <div id="controls">
        <docs-control label="Theme" key="theme">
          <docs-control-option label="White" value="white"></docs-control-option>
          <docs-control-option label="Gray 10" value="g10"></docs-control-option>
          <docs-control-option label="Gray 90" value="g90"></docs-control-option>
          <docs-control-option label="Gray 100" value="g100"></docs-control-option>
        </docs-control>
        <docs-control label="Mode" key="mode">
          <docs-control-option label="Productive" value="productive"></docs-control-option>
          <docs-control-option label="Expressive" value="expressive"></docs-control-option>
        </docs-control>
        <docs-control label="Size" key="size">
          <docs-control-option label="XS" value="xs"></docs-control-option>
          <docs-control-option label="SM" value="sm"></docs-control-option>
          <docs-control-option label="MD" value="md"></docs-control-option>
          <docs-control-option label="LG" value="lg"></docs-control-option>
          <docs-control-option label="XL" value="xl"></docs-control-option>
        </docs-control>
        <docs-control label="Density" key="density">
          <docs-control-option label="Condensed" value="condensed"></docs-control-option>
          <docs-control-option label="Normal" value="normal"></docs-control-option>
        </docs-control>
      </div>

      <docs-panel-toggle-button
        id="controls-toggle-button"
        label="controls"
      ></docs-panel-toggle-button>
    </header>

    <docs-menu id="menu"></docs-menu>

    <main>
      <docs-demo></docs-demo>
      <div id="fade"></div>
      <docs-tabs>
        <docs-tab-panel label="Overview">
          <docs-element-overview></docs-element-overview>
        </docs-tab-panel>
        <docs-tab-panel label="Configuration">
          <docs-api-table></docs-api-table>
        </docs-tab-panel>
        <docs-tab-panel label="HTML">
          <docs-source-code kind="html"></docs-source-code>
        </docs-tab-panel>
        <docs-tab-panel label="SCSS">
          <docs-source-code kind="scss"></docs-source-code>
        </docs-tab-panel>
      </docs-tabs>
    </main>

    <script type="module" src="./ui"></script>
  </body>
</html>
