<label>
  Unchecked
  <input type="checkbox" />
</label>

<label>
  Unchecked (disabled)
  <input type="checkbox" disabled />
</label>

<label>
  Checked
  <input type="checkbox" checked />
</label>

<label>
  Checked (disabled)
  <input type="checkbox" checked disabled />
</label>

<label>
  Indeterminate
  <input type="checkbox" />
</label>

<label>
  Indeterminate (disabled)
  <input type="checkbox" disabled />
</label>
