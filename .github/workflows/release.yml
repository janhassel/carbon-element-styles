name: Release

on:
  push:
    branches:
        - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: |
          npm ci
      - name: Build project
        run: |
          npm run build
      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
      - name: Parse version number
        id: parse_version
        run: |
          COMMIT_MESSAGE=$(echo "${{ github.event.head_commit.message }}" | head -n 1)
          VERSION=$(echo "$COMMIT_MESSAGE" | sed -n 's/^chore(release): *\([^ \n]*\).*/\1/p')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          VERSION="${{ steps.parse_version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
      - name: Create GitHub release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const version = '${{ steps.parse_version.outputs.VERSION }}';

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: version,
              name: version,
              prerelease: version.includes('-'),
              generate_release_notes: true,
            });
      - name: Create npm release
        run: |
          TAG=$(echo "${{ steps.parse_version.outputs.version }}" | grep -q '-' && echo "next" || echo "latest")
          npm publish --provenance --tag $TAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CARBON_BOT_NPM_TOKEN }}
