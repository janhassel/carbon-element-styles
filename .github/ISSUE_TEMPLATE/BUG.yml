name: Bug report 🐛
description:
  Something not working as expected? This is the place to report your issue.
labels: 'type/bug'
labels: []
body:
  - type: markdown
    attributes:
      value: '## Welcome!'
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are you experiencing the issue?
      multiple: true
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
  - type: input
    id: version
    attributes:
      label: Package version
      description: Which version are you using?
      placeholder: e.g. v0.2.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Tell us more about the problem that you’re running into
      placeholder: What did you see? What did you expect to see?
    validations:
      required: true
  - type: input
    id: example-url
    attributes:
      label: Reproduction/example
      description:
        Re-create the issue using [CodeSandbox](https://codesandbox.io/) or [Stackblitz](https://stackblitz.com).
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description:
        How do we reproduce the error you described using the reproduction/example link above?
    validations:
      required: true
  - type: input
    id: application
    attributes:
      label: Application/product
      description: What application and/or product do you work on?
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: Please confirm the following
      options:
        - label:
            I agree to follow this project’s [Code of Conduct](https://github.com/carbon-design-system/.github/blob/main/.github/CODE_OF_CONDUCT.md)
          required: true
        - label:
            I checked the [current issues](https://github.com/carbon-design-system/carbon-element-styles/issues) for duplicate problems
