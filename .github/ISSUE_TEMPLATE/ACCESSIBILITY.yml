name: Accessibility Issue ♿
description: Report an accessibility or usability issue.
title: '[a11y]: '
labels: 'type/accessibility'
body:
  - type: markdown
    attributes:
      value: '## Welcome!'
  - type: markdown
    attributes:
      value:
        Thanks for taking the time to fill out this accessibility report. IBM
        firmly believes that web and software experiences should be accessible
        for everyone. Carbon is committed to following and complying with
        accessibility best practices.
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are you experiencing the issue?
      multiple: true
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: Which operating system are you using?
      multiple: true
      options:
        - Windows
        - macOS
        - Other
  - type: input
    id: version
    attributes:
      label: Package version
      description: 'Which version(s) are you using?'
      placeholder: e.g. v0.2.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description:
        Tell us more about the accessibility issue that you’re experiencing
      placeholder: What did you expect to happen? What happened instead?
    validations:
      required: true
  - type: input
    id: wcag
    attributes:
      label: WCAG 2.1 Violation
      description: 'Does this violate a specific WCAG 2.1 checkpoint?'
      placeholder: e.g Success Criterion 1.4.3 Contrast (Minimum)
  - type: input
    id: example-url
    attributes:
      label: Reproduction/example
      description:
        Re-create the issue using [CodeSandbox](https://codesandbox.io/) or [Stackblitz](https://stackblitz.com).
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description:
        How do we reproduce the error you described using the reproduction/example link above?
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: Please confirm the following
      options:
        - label:
            I agree to follow this project’s [Code of Conduct](https://github.com/carbon-design-system/.github/blob/main/.github/CODE_OF_CONDUCT.md)
          required: true
        - label:
            I checked the [current issues](https://github.com/carbon-design-system/carbon-element-styles/issues) for duplicate problems
